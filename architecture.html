<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>Cortex — Architecture Flowchart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d1117;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    /* ── Free canvas ─────────────────────────────────────────── */
    .viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      user-select: none;
    }
    .viewport.grabbing { cursor: grabbing; }

    .canvas-container {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    svg.main {
      display: block;
      width: 1580px;
      height: 920px;
    }

    /* ── HUD overlay ─────────────────────────────────────────── */
    .hud {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 100;
    }

    .hud-group {
      display: flex;
      flex-direction: column;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }

    .hud-btn {
      width: 36px; height: 36px;
      background: none;
      border: none;
      border-bottom: 1px solid #21262d;
      color: #8b949e;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .hud-btn:last-child { border-bottom: none; }
    .hud-btn:hover { background: #21262d; color: #e6edf3; }

    .hud-zoom {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #6e7681;
      font-family: 'SF Mono', monospace;
      font-size: 10px;
      text-align: center;
      padding: 5px 0;
      width: 36px;
    }

    /* ── Legend (fixed top-left) ─────────────────────────────── */
    .legend {
      position: fixed;
      top: 16px; left: 16px;
      background: #161b22cc;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    .legend-title {
      font-size: 9px;
      color: #484f58;
      letter-spacing: 0.1em;
      margin-bottom: 2px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #8b949e; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── Hint bar ────────────────────────────────────────────── */
    .hint {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: #161b22cc;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 10px;
      color: #484f58;
      z-index: 100;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    /* CSS animations for pulsing nodes */
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .pulse { animation: pulse 2.5s ease-in-out infinite; }
    .pulse-slow { animation: pulse 4s ease-in-out infinite; }

    @keyframes shimmer {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }
  </style>
</head>

<!-- HUD controls -->
<div class="hud">
  <div class="hud-zoom" id="zoom-label">100%</div>
  <div class="hud-group">
    <button class="hud-btn" id="btn-zoomin"  title="Zoom in (=)">+</button>
    <button class="hud-btn" id="btn-zoomout" title="Zoom out (-)">−</button>
  </div>
  <div class="hud-group">
    <button class="hud-btn" id="btn-fit" title="Fit to screen (F)" style="font-size:13px">⊙</button>
  </div>
</div>

<div class="hint">drag to pan &nbsp;·&nbsp; scroll to zoom &nbsp;·&nbsp; F to fit</div>

<script>
  const viewport = document.getElementById('viewport');
  const canvas   = document.getElementById('canvas');
  const zoomLabel = document.getElementById('zoom-label');

  const NATIVE_W = 1580, NATIVE_H = 920;
  const MIN_SCALE = 0.15, MAX_SCALE = 4;

  let tx = 0, ty = 0, scale = 1;

  function applyTransform() {
    canvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    zoomLabel.textContent = `${Math.round(scale * 100)}%`;
  }

  function fitToScreen() {
    const vw = viewport.clientWidth;
    const vh = viewport.clientHeight;
    const padding = 40;
    scale = Math.min((vw - padding * 2) / NATIVE_W, (vh - padding * 2) / NATIVE_H);
    scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale));
    tx = (vw - NATIVE_W * scale) / 2;
    ty = (vh - NATIVE_H * scale) / 2;
    applyTransform();
  }

  function zoomAt(cx, cy, factor) {
    const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * factor));
    tx = cx - (cx - tx) * (newScale / scale);
    ty = cy - (cy - ty) * (newScale / scale);
    scale = newScale;
    applyTransform();
  }

  // ── Pan ───────────────────────────────────────────────────────
  let dragging = false, sx = 0, sy = 0, stx = 0, sty = 0;

  viewport.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragging = true; sx = e.clientX; sy = e.clientY; stx = tx; sty = ty;
    viewport.classList.add('grabbing');
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    tx = stx + (e.clientX - sx);
    ty = sty + (e.clientY - sy);
    applyTransform();
  });

  window.addEventListener('mouseup', () => {
    dragging = false;
    viewport.classList.remove('grabbing');
  });

  // ── Touch pan ─────────────────────────────────────────────────
  let t0 = null;
  viewport.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      t0 = { x: e.touches[0].clientX, y: e.touches[0].clientY, tx, ty };
    }
  }, { passive: true });

  viewport.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && t0) {
      tx = t0.tx + (e.touches[0].clientX - t0.x);
      ty = t0.ty + (e.touches[0].clientY - t0.y);
      applyTransform();
    }
  }, { passive: true });

  // ── Scroll zoom ───────────────────────────────────────────────
  viewport.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    const rect = viewport.getBoundingClientRect();
    zoomAt(e.clientX - rect.left, e.clientY - rect.top, factor);
  }, { passive: false });

  // ── Buttons ───────────────────────────────────────────────────
  const center = () => ({ cx: viewport.clientWidth / 2, cy: viewport.clientHeight / 2 });
  document.getElementById('btn-zoomin').addEventListener('click', () => {
    const { cx, cy } = center(); zoomAt(cx, cy, 1.25);
  });
  document.getElementById('btn-zoomout').addEventListener('click', () => {
    const { cx, cy } = center(); zoomAt(cx, cy, 1 / 1.25);
  });
  document.getElementById('btn-fit').addEventListener('click', fitToScreen);

  // ── Keyboard ──────────────────────────────────────────────────
  window.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    const { cx, cy } = center();
    if (e.key === '=' || e.key === '+') zoomAt(cx, cy, 1.25);
    if (e.key === '-' || e.key === '_') zoomAt(cx, cy, 1 / 1.25);
    if (e.key === 'f' || e.key === 'F' || e.key === '0') fitToScreen();
  });

  // ── Init ──────────────────────────────────────────────────────
  fitToScreen();
  window.addEventListener('resize', fitToScreen);
</script>
